name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: /BoardingHouse
          NEXT_PUBLIC_STATIC_EXPORT: "1"
        run: yarn build

      - name: Prepare artifact
        # Next's `basePath` can cause the export to land under `out/<basePath>/`.
        # GitHub Pages expects the site root to be the artifact root.
        run: |
          rm -rf ./out_publish
          mkdir -p ./out_publish

          # Copy everything first (this should include `index.html` at the root when it exists).
          cp -r ./out/* ./out_publish/

          # If Next also exported into `out/BoardingHouse/`, overlay those files on top
          # so `/_next/*` assets resolve under the correct basePath.
          if [ -d "./out/BoardingHouse" ]; then
            cp -r ./out/BoardingHouse/* ./out_publish/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./out_publish"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

