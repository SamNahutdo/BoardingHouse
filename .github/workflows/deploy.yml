name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: /BoardingHouse
          NEXT_PUBLIC_STATIC_EXPORT: "1"
        run: pnpm build

      - name: Prepare artifact
        # Next's `basePath` can cause the export to land under `out/<basePath>/`.
        # GitHub Pages expects the site root to be the artifact root.
        run: |
          rm -rf ./out_publish
          mkdir -p ./out_publish

          # Copy everything first (this should include `index.html` at the root when it exists).
          cp -r ./out/* ./out_publish/ || true

          # If Next also exported into `out/BoardingHouse/`, overlay those files on top
          # so `/_next/*` assets resolve under the correct basePath.
          if [ -d "./out/BoardingHouse" ]; then
            cp -r ./out/BoardingHouse/* ./out_publish/ || true
          fi

          # Some Next exports place the home route under `index/index.html` instead of `index.html`.
          # Ensure GitHub Pages always has `index.html` at the publish root.
          if [ ! -f ./out_publish/index.html ] && [ -f ./out_publish/index/index.html ]; then
            cp ./out_publish/index/index.html ./out_publish/index.html
          fi
          if [ ! -f ./out_publish/index.html ] && [ -f ./out_publish/BoardingHouse/index/index.html ]; then
            cp ./out_publish/BoardingHouse/index/index.html ./out_publish/index.html
          fi

          # Flatten `_next` if it ended up nested.
          if [ ! -d ./out_publish/_next ] && [ -d ./out_publish/BoardingHouse/_next ]; then
            cp -r ./out_publish/BoardingHouse/_next ./out_publish/_next
          fi
          if [ ! -d ./out_publish/_next ] && [ -d ./out_publish/index/_next ]; then
            cp -r ./out_publish/index/_next ./out_publish/_next
          fi

          # For SPA routing, make 404.html serve the app so react-router can handle client-side routes
          cp ./out_publish/index.html ./out_publish/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./out_publish"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

